syntax = "proto3";

package auth.v1;

option java_multiple_files = true;
option java_package = "com.orbitto.auth.grpc.v1";
option java_outer_classname = "AuthProto";

// gRPC API модуля Identity & Access (операции в стиле команд/запросов).
service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (TokenPairResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (TokenPairResponse);
  rpc RequestPasswordReset(RequestPasswordResetRequest) returns (RequestPasswordResetResponse);
  rpc ConfirmPasswordReset(ConfirmPasswordResetRequest) returns (ConfirmPasswordResetResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
}

message RegisterResponse {
  string user_id = 1;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message TokenPairResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 access_expires_at_epoch_seconds = 3;
  int64 refresh_expires_at_epoch_seconds = 4;
}

message RequestPasswordResetRequest {
  string email = 1;
}

message RequestPasswordResetResponse {
  // Одинаковый «успех» в любом случае — чтобы не светить существование аккаунта.
  bool acknowledged = 1;
}

message ConfirmPasswordResetRequest {
  string token = 1;
  string new_password = 2;
}

message ConfirmPasswordResetResponse {
  bool success = 1;
}
